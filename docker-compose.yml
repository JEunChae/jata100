services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - path: .env.local
        required: false
    # Set WATCHPACK_POLLING=true in .env.local if file-watching doesn't work (macOS/Windows)
